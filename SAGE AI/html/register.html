<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAGE AI — Criar conta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body class="auth-page">

<div class="auth-container">
  <a href="../index.html" class="logo auth-logo">SAGE <span>AI</span></a>

  <div class="auth-card">
    <h1 class="auth-title">Criar conta</h1>
    <p class="auth-sub">Grátis para sempre no plano básico.</p>

    <div class="form-error" id="formError"></div>

    <form id="registerForm" novalidate>
      <div class="field">
        <label for="name">Nome completo</label>
        <input type="text" id="name" name="name" placeholder="Seu nome" autocomplete="name" />
        <span class="field__error" id="nameErr"></span>
      </div>
      <div class="field">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email" />
        <span class="field__error" id="emailErr"></span>
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <div class="field__input-wrap">
          <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" />
          <button type="button" class="field__toggle" id="togglePass" aria-label="Mostrar senha">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="password-strength" id="strengthBar">
          <div class="strength-fill" id="strengthFill"></div>
        </div>
        <span class="field__hint" id="strengthLabel"></span>
        <span class="field__error" id="passErr"></span>
      </div>
      <div class="field">
        <label for="confirmPassword">Confirmar senha</label>
        <div class="field__input-wrap">
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repita a senha" autocomplete="new-password" />
        </div>
        <span class="field__error" id="confirmErr"></span>
      </div>

      <label class="checkbox" style="margin-bottom: 20px;">
        <input type="checkbox" id="terms" />
        <span>Aceito os <a href="#" class="link">termos de uso</a></span>
      </label>

      <button type="submit" class="btn btn--primary btn--full" id="registerBtn">
        <span id="registerBtnText">Criar conta</span>
        <span class="spinner" id="registerSpinner"></span>
      </button>
    </form>

    <div class="auth-divider"><span>ou</span></div>

    <a href="chat.html" class="btn btn--ghost btn--full">Continuar sem conta</a>

    <p class="auth-footer">Já tem conta? <a href="login.html" class="link">Entrar</a></p>
  </div>
</div>

<script src="../js/global.js"></script>
<script src="../js/auth.js"></script>
<script>
  initRegisterPage();
</script>
</body>
</html>
