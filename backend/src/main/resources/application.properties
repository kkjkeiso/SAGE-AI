spring.application.name=sageai
server.port=3000

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/sageai
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
jwt.secret=sage-ai-secret-key-change-in-production
jwt.expiration=86400000

# Groq API — configurada por variável de ambiente (export GROQ_API_KEY="sua_chave")
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=llama-3.3-70b-versatile
