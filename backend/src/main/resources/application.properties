# ================================
# SAGE AI — application.properties
# Configuração principal do backend Spring Boot
# ================================

# ---------- Servidor ----------
spring.application.name=sageai
server.port=3000

# ---------- PostgreSQL ----------
spring.datasource.url=jdbc:postgresql://localhost:5432/sageai
spring.datasource.username=postgres
spring.datasource.password=postgres

# ---------- JPA / Hibernate ----------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ---------- JWT ----------
# Em produção, use uma chave de pelo menos 256 bits via variável de ambiente
jwt.secret=${JWT_SECRET:sage-ai-secret-key-change-in-production-256bits}
jwt.expiration=86400000

# ---------- Groq API ----------
# Configurada via variável de ambiente: export GROQ_API_KEY="sua_chave"
# NUNCA coloque a chave diretamente aqui
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=llama-3.3-70b-versatile

# ---------- Multipart (upload de áudio) ----------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
