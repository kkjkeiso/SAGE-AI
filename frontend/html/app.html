<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAGE AI - Chat</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
          href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
          rel="stylesheet">

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/app.css">
</head>

<body class="app-body">
<button class="theme-toggle auth-theme-toggle" id="themeToggle" aria-label="Alternar modo">
    <span class="theme-toggle__track">
      <span class="theme-toggle__thumb">
        <svg class="theme-toggle__icon theme-toggle__sun" width="12" height="12" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="4"></circle>
          <path
                  d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42">
          </path>
        </svg>
        <svg class="theme-toggle__icon theme-toggle__moon" width="11" height="11" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
        </svg>
      </span>
    </span>
</button>

<div class="app-layout">
  <aside class="sidebar" id="sidebar">

    <div class="sidebar__header">
      <a href="../../index.html" class="logo">
        <b class="logo__e">S</b><b class="logo__text">AGE</b><span style="color: var(--green) !important; background: transparent !important; padding: 0 !important; margin-left: 6px;">AI</span>
      </a>
    </div>

    <nav class="sidebar__nav">
      <div class="sidebar__label">Hoje</div>
    </nav>

    <div class="sidebar__footer">
      <div style="position: relative; height: 44px; width: 100%; display: flex; align-items: center; justify-content: center;">

        <a href="login.html" class="auth-collapse-icon" title="Acessar Conta">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
            <polyline points="10 17 15 12 10 7"></polyline>
            <line x1="15" y1="12" x2="3" y2="12"></line>
          </svg>
        </a>

        <div class="auth-buttons">
          <a href="login.html" class="btn btn--ghost" style="flex: 1; justify-content: center; display: flex; align-items: center; height: 100%; padding: 0; font-size: 13px;">Entrar</a>
          <a href="register.html" class="btn btn--primary" style="flex: 1; justify-content: center; display: flex; align-items: center; height: 100%; padding: 0; font-size: 13px;">Criar</a>
        </div>

      </div>
    </div>
  </aside>

  <main class="main-content">

    <header class="mobile-header">
      <a href="#" class="logo">SAGE <span style="color: var(--green) !important; background: transparent !important; padding: 0 !important;">AI</span></a>
      <button id="mobileMenuBtn" aria-label="Abrir menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </header>

    <section class="tab-content active" id="tab-equality">
      <div class="header-area">
        <h1>SAGE <span style="color: var(--green) !important;">AI</span></h1>
      </div>

      <div class="tool-layout">
        <div class="chat-container">
          <div class="chat-history" id="eqChatHistoryBox">

            <div class="bot-msg">
                <span class="bot-icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
                </span>
              <div class="bubble">Olá! O que há para hoje?</div>
            </div>

          </div>

          <div class="chat-input-area" style="align-items: center; gap: 8px;">
            <button class="btn btn--ghost chat-action-btn" title="Anexar arquivo" id="btnEqAttach">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
            </button>
            <button class="btn btn--ghost chat-action-btn" title="Adicionar Imagem" id="btnEqPhoto">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            </button>
            <textarea id="SAGEAIchatInput" placeholder="Envie uma mensagem para SAGE AI..."></textarea>
            <button class="btn btn--primary" id="btnEqSendChat">Mandar</button>
          </div>
        </div>
      </div>
    </section>

  </main>
</div>

<script src="../js/global.js"></script>
<script src="../js/app.js"></script>
</body>

</html>
