<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAGE AI — Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/chat.css" />
</head>
<body class="chat-page">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__header">
      <a href="../index.html" class="logo">SAGE <span>AI</span></a>
      <button class="icon-btn" id="newChat" title="Nova conversa">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>

    <div class="sidebar__user" id="sidebarUser">
      <!-- injetado via JS dependendo de auth -->
    </div>

    <nav class="sidebar__nav">
      <p class="sidebar__nav-label">Conversas recentes</p>
      <ul class="chat-list" id="chatList">
        <!-- injetado via JS -->
      </ul>
    </nav>

    <div class="sidebar__footer">
      <div class="sidebar__guest-cta" id="guestCta">
        <p>Salve seu progresso</p>
        <a href="register.html" class="btn btn--primary btn--sm btn--full">Criar conta grátis</a>
        <a href="login.html" class="btn btn--ghost btn--sm btn--full">Entrar</a>
      </div>
      <button class="sidebar__logout" id="logoutBtn" style="display:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </button>
    </div>
  </aside>

  <!-- OVERLAY mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- MAIN -->
  <main class="chat-main">

    <!-- TOPBAR -->
    <div class="chat-topbar">
      <button class="icon-btn" id="sidebarToggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="chat-topbar__title">
        <span class="status-dot"></span>
        <span id="chatTitle">SAGE AI</span>
      </div>
      <div style="width:36px"></div>
    </div>

    <!-- MESSAGES -->
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome__logo">SAGE <span>AI</span></div>
        <h2>O que há para hoje?</h2>
        <p>Pode perguntar qualquer coisa — como uma conversa mesmo.</p>
        <div class="welcome__chips">
          <button class="chip" onclick="useChip(this)">O que é fotossíntese?</button>
          <button class="chip" onclick="useChip(this)">Como funciona a Lei de Newton?</button>
          <button class="chip" onclick="useChip(this)">Me dê um exercício de matemática</button>
          <button class="chip" onclick="useChip(this)">Explique a Segunda Guerra Mundial</button>
        </div>
      </div>
    </div>

    <!-- INPUT -->
    <div class="chat-input-area">
      <div class="chat-input-wrap">
        <textarea
          id="chatInput"
          placeholder="O que há para hoje?"
          rows="1"
          maxlength="2000"
        ></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
      <p class="chat-input-hint">SAGE pode cometer erros. Verifique informações importantes.</p>
    </div>

  </main>

  <script src="../js/global.js"></script>
  <script src="../js/chat.js"></script>
</body>
</html>
