<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAGE AI — Entrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body class="auth-page">

  <div class="auth-container">

    <a href="../../index.html" class="auth-back-btn" aria-label="Voltar para a página inicial">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      <span>Voltar</span>
    </a>

    <button class="theme-toggle auth-theme-toggle" id="themeToggle" aria-label="Alternar modo claro/escuro">
      <span class="theme-toggle__track">
        <span class="theme-toggle__thumb">
          <svg class="theme-toggle__icon theme-toggle__sun" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
          </svg>
          <svg class="theme-toggle__icon theme-toggle__moon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
          </svg>
        </span>
      </span>
    </button>

    <a href="../../index.html" class="logo auth-logo">SAGE<span>AI</span></a>

    <div class="auth-card">
      <h1 class="auth-title">Bem-vindo de volta</h1>
      <p class="auth-sub">Entre com sua conta para prosseguir.</p>

      <div class="form-error" id="formError"></div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email" />
          <span class="field__error" id="emailErr"></span>
        </div>
        <div class="field">
          <label for="password">Senha</label>
          <div class="field__input-wrap">
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="field__toggle" id="togglePass" aria-label="Mostrar senha">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="field__error" id="passErr"></span>
        </div>

        <div class="field__row">
          <label class="checkbox">
            <input type="checkbox" id="remember" />
            <span>Lembrar de mim</span>
          </label>
          <a href="#" class="link">Esqueceu a senha?</a>
        </div>

        <button type="submit" class="btn btn--primary btn--full" id="loginBtn">
          <span id="loginBtnText">Entrar</span>
          <span class="spinner" id="loginSpinner"></span>
        </button>
      </form>

      <div class="auth-divider"><span>ou</span></div>

      <a href="app.html" class="btn btn--ghost btn--full">Continuar sem conta</a>

      <p class="auth-footer">Não tem conta? <a href="register.html" class="link">Criar agora</a></p>
    </div>
  </div>

  <script src="../js/global.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
